services:
  paul-db-dev:
    # DEV ONLY — do not use in production
    image: mariadb:10.11
    container_name: paul-db-dev
    restart: always
    environment:
      MARIADB_DATABASE: paul_dev
      MARIADB_USER: paul
      MARIADB_PASSWORD: paul_dev_password
      MARIADB_ROOT_PASSWORD: root_dev_password
    ports:
      - "3307:3306"
    volumes:
      - paul-db-dev-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  paul-db-dev-data: